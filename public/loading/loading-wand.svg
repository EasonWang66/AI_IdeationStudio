<svg viewBox="0 0 400 400" width="280" height="280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Loading">
  <style>
    @keyframes loading-wand-spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes loading-wand-twinkle {
      0%,
      100% {
        transform: scale(0.88);
        opacity: 0.85;
      }

      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }

    .loading-wand-star {
      animation: loading-wand-twinkle 1.6s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .loading-wand-orbit {
      animation: loading-wand-spin 2.6s linear infinite;
      transform-origin: 280px 120px;
    }
  </style>
  <line x1="110" y1="300" x2="215" y2="185" stroke="#fff" stroke-width="34" stroke-linecap="round" />
  <g class="loading-wand-orbit">
    <g transform="translate(325,120)">
      <path class="loading-wand-star" d="M0,-24 C4,-8 8,-4 24,0 C8,4 4,8 0,24 C-4,8 -8,4 -24,0 C-8,-4 -4,-8 0,-24 Z" fill="#fff" />
    </g>
  </g>
</svg>
